name: Build Converter Image AWS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - Dockerfile.lambda
      - go.mod
      - cmd/pdf-to-png-converter/**
      - internal/converter/**
      - .github/workflows/build-converter-image-aws.yml

env:
  ECR_REPOSITORY: soc5-pdf-to-png

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: docker build -t "$REGISTRY/$ECR_REPOSITORY:latest" .
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}

      - name: Push image
        run: docker push "$REGISTRY/$ECR_REPOSITORY:latest"
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}

      - name: Build Lambda image
        run: docker build -f Dockerfile.lambda -t "$REGISTRY/$ECR_REPOSITORY:lambda-latest" .
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}

      - name: Push Lambda image
        run: docker push "$REGISTRY/$ECR_REPOSITORY:lambda-latest"
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
